<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bukber Alumni 9B</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    color:#333;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* Efek Bintang Halus */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity:0.05;
    top:0;
    left:0;
}

.overlay {
    background: rgba(255,255,255,0.92);
    min-height:100vh;
    padding:40px 20px;
    backdrop-filter: blur(5px);
}

.card {
    background:white;
    padding:25px;
    border-radius:20px;
    max-width:400px;
    margin:20px auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

button {
    background: linear-gradient(45deg, #c9a227, #f5d76e);
    color:#333;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    opacity:0.9;
}

.gallery {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.gallery img {
    width:250px;
    margin:10px;
    border-radius:15px;
}

#countdown {
    font-size:18px;
    margin-top:10px;
    font-weight:bold;
    color:#2e7d32;
}
</style>
</head>

<body>

<div class="overlay">

<h1>🌙 BUKA BERSAMA ALUMNI</h1>
<h2>Kelas 9B MTsN 02 Brebes</h2>
<p>✨ Back to Memory School ✨</p>

<div id="countdown"></div>

<div class="card">
<p><b>Hari/Tanggal:</b><br>Senin, 17 Maret 2026</p>
<p><b>Tempat:</b><br>Lentera Coffee</p>
<p><b>Waktu:</b><br>16.30 WIB - Selesai</p>
<button onclick="konfirmasi()">Konfirmasi Kehadiran</button>
</div>

<h3>Daftar Alumni Hadir:</h3>
<ul id="listHadir"></ul>

<h3>Galeri Kenangan</h3>
<div class="gallery">
<img src="kenangan1.jpeg">
<img src="kenangan9b.jpeg">
</div>

<p>Sampai bertemu dan mengenang masa putih biru 💜</p>

</div>

<script>
// COUNTDOWN
var countDate = new Date("March 17, 2026 16:30:00").getTime();
var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    document.getElementById("countdown").innerHTML =
    "⏳ " + days + " Hari Lagi Menuju Bukber!";
}, 1000);

// LIST HADIR
function konfirmasi(){
    var nama = prompt("Masukkan Nama Kamu:");
    if(nama){
        var li = document.createElement("li");
        li.textContent = nama + " - Hadir ✅";
        document.getElementById("listHadir").appendChild(li);
    }
}
</script>

</body>
</html>
